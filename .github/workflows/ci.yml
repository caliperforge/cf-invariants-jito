name: ci

# cf-invariants-jito Phase-2 CI — invariants + Crucible + scorecards.
#
# The CI run IS the proof: zero local toolchain footprint, every push
# rebuilds the Jito tip-distribution program (anchor-lang 0.31.1 -> 1.0.1
# port) AND its 4 planted twins, then runs the Crucible harness on every
# clean/planted pair, asserting clean=0 violations and planted>=1 per
# invariant class. Real scorecards are captured (ANSI-stripped) under
# findings/<invariant>/ and uploaded as an artifact. If any matrix cell
# stops being green, the artifact is broken — we never publish a manual
# "verified" claim.
#
# Classes proven by this CI:
#   - claim_amount_conservation — jito_tipdist_ref pair, invariant_claim_amount_conservation
#   - no_double_claim           — jito_tipdist_ref pair, invariant_no_double_claim
#   - merkle_authority          — jito_tipdist_ref pair, invariant_merkle_proof_required
#   - admin_gating              — jito_tipdist_ref pair, invariant_update_config_requires_authority
#
# Pinned upstream surfaces (matched to cf-invariants-anchor's ci.yml):
#   - Crucible:        v0.2.0    (asymmetric-research/crucible)
#   - anchor-lang:     1.0.1     (matches Crucible v0.2.0 workspace)
#   - Solana CLI:      v2.1.21   (Anza release; recent stable)
#   - platform-tools:  v1.52     (recent tag with linux-x86_64 asset; the
#                                 bundled default in Agave v2.1.21 is v1.43,
#                                 too old for anchor-lang 1.0.1 deps.
#                                 NB: Agave v2.1.21 ships a buggy
#                                 cargo-build-sbf that panics if
#                                 ~/.cache/solana doesn't exist - we mkdir
#                                 it explicitly before the first invocation.)
#
# The two env vars GIT_SHA / GIT_REF_NAME are read by the program's build.rs
# and baked into the on-chain security-txt block via env!(). Without them the
# build emits a "GIT_SHA_MISSING" / "GIT_REF_NAME_MISSING" placeholder, which
# is fine for CI — this CI is not producing release artifacts for mainnet,
# only proof-of-buildability for the harness pipeline.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CRUCIBLE_REF: v0.2.0
  SOLANA_VERSION: v2.1.21
  SOLANA_TOOLS_VERSION: v1.52
  # Iteration budget per Crucible run. Small enough to fit a free-tier
  # GitHub-hosted runner; large enough for the planted bug to fire
  # (minimal counterexamples for these invariants are 1-2 actions).
  CRUCIBLE_TIMEOUT: '30'

jobs:
  workspace-check:
    name: cf-invariants-jito workspace check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      - name: cargo check --workspace
        run: cargo check --workspace --locked || cargo check --workspace

  build-sbf:
    name: cargo build-sbf jito-tip-distribution (Phase-1 marquee artifact)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      - name: Install Anza / Solana CLI ${{ env.SOLANA_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Pre-create platform-tools cache dir
        run: mkdir -p "$HOME/.cache/solana"

      - name: Verify solana / cargo-build-sbf on PATH
        run: |
          solana --version
          cargo-build-sbf --version

      - name: cargo build-sbf jito-tip-distribution
        env:
          GIT_SHA: ${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          cargo build-sbf \
            --tools-version "${SOLANA_TOOLS_VERSION}" \
            --manifest-path programs/tip-distribution/Cargo.toml
          ls -l target/deploy/jito_tip_distribution.so

      - name: Upload built program artifact
        uses: actions/upload-artifact@v4
        with:
          name: jito_tip_distribution-so
          path: target/deploy/jito_tip_distribution.so

  harness:
    name: build + run Crucible harness (4 invariants × clean+planted)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      - name: Install Anza / Solana CLI ${{ env.SOLANA_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Pre-create platform-tools cache dir
        run: mkdir -p "$HOME/.cache/solana"

      - name: Verify solana / cargo-build-sbf on PATH
        run: |
          solana --version
          cargo-build-sbf --version

      - name: Clone Crucible @ ${{ env.CRUCIBLE_REF }} (sibling to this repo)
        # Path deps in references/*/fuzz/*/Cargo.toml resolve to
        # `../../../../../crucible/...`, i.e. <repo-root>/../crucible.
        # We use $GITHUB_WORKSPACE/../crucible to satisfy that.
        working-directory: ${{ github.workspace }}/..
        run: |
          git clone --depth 1 --branch "${CRUCIBLE_REF}" \
            https://github.com/asymmetric-research/crucible.git crucible
          (cd crucible && git rev-parse HEAD)

      # Second rust-cache step (Crucible build dir under <repo-root>/../crucible)
      # is intentionally inline — the composite action targets the workspace
      # cache; this one needs a distinct cache key for the pinned upstream.
      - name: Cache cargo (Crucible build)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ../crucible -> target
          key: crucible-${{ env.CRUCIBLE_REF }}

      - name: Build + install Crucible CLI from v0.2.0 source
        working-directory: ${{ github.workspace }}/../crucible
        run: |
          cargo install --path crates/crucible-fuzz-cli --locked || \
            cargo install --path crates/crucible-fuzz-cli
          which crucible
          crucible --version || crucible --help | head -3

      # -----------------------------------------------------------------
      # Build the clean reference's .so ONCE — the same artifact backs
      # all 4 fuzz fixtures under references/jito_tipdist_ref/fuzz/*.
      # -----------------------------------------------------------------

      - name: cargo build-sbf jito_tipdist_ref (clean)
        env:
          GIT_SHA: ${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          cargo build-sbf \
            --tools-version "${SOLANA_TOOLS_VERSION}" \
            --manifest-path references/jito_tipdist_ref/programs/tip-distribution/Cargo.toml
          ls -l references/jito_tipdist_ref/target/deploy/jito_tip_distribution.so

      # -----------------------------------------------------------------
      # Build all 4 planted twins.
      # -----------------------------------------------------------------

      - name: cargo build-sbf jito_tipdist_ref_planted_claim_conservation
        env:
          GIT_SHA: ${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          cargo build-sbf \
            --tools-version "${SOLANA_TOOLS_VERSION}" \
            --manifest-path references/jito_tipdist_ref_planted_claim_conservation/programs/tip-distribution/Cargo.toml
          ls -l references/jito_tipdist_ref_planted_claim_conservation/target/deploy/jito_tip_distribution.so

      - name: cargo build-sbf jito_tipdist_ref_planted_no_double_claim
        env:
          GIT_SHA: ${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          cargo build-sbf \
            --tools-version "${SOLANA_TOOLS_VERSION}" \
            --manifest-path references/jito_tipdist_ref_planted_no_double_claim/programs/tip-distribution/Cargo.toml
          ls -l references/jito_tipdist_ref_planted_no_double_claim/target/deploy/jito_tip_distribution.so

      - name: cargo build-sbf jito_tipdist_ref_planted_merkle_authority
        env:
          GIT_SHA: ${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          cargo build-sbf \
            --tools-version "${SOLANA_TOOLS_VERSION}" \
            --manifest-path references/jito_tipdist_ref_planted_merkle_authority/programs/tip-distribution/Cargo.toml
          ls -l references/jito_tipdist_ref_planted_merkle_authority/target/deploy/jito_tip_distribution.so

      - name: cargo build-sbf jito_tipdist_ref_planted_admin_gating
        env:
          GIT_SHA: ${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          cargo build-sbf \
            --tools-version "${SOLANA_TOOLS_VERSION}" \
            --manifest-path references/jito_tipdist_ref_planted_admin_gating/programs/tip-distribution/Cargo.toml
          ls -l references/jito_tipdist_ref_planted_admin_gating/target/deploy/jito_tip_distribution.so

      # -----------------------------------------------------------------
      # Sync fixture sources clean → planted (the fixture source IS the
      # contract; both variants must run the same probe code so the only
      # behavioral difference is the planted bug).
      # -----------------------------------------------------------------

      - name: Sync fixture sources clean → planted (each invariant)
        run: |
          for inv in jito_claim_conservation jito_no_double_claim jito_merkle_authority jito_admin_gating; do
            for planted in jito_tipdist_ref_planted_claim_conservation \
                           jito_tipdist_ref_planted_no_double_claim \
                           jito_tipdist_ref_planted_merkle_authority \
                           jito_tipdist_ref_planted_admin_gating; do
              cp "references/jito_tipdist_ref/fuzz/${inv}/src/main.rs" \
                 "references/${planted}/fuzz/${inv}/src/main.rs"
            done
          done

      # -----------------------------------------------------------------
      # Pair 1 — claim_amount_conservation
      # -----------------------------------------------------------------

      - name: Crucible run — claim_conservation CLEAN (expect 0 violations)
        id: claim_conservation_clean
        working-directory: references/jito_tipdist_ref/fuzz/jito_claim_conservation
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/ci-out"
          crucible run jito_tip_distribution invariant_claim_amount_conservation \
              --release --timeout "${CRUCIBLE_TIMEOUT}" \
              2>&1 | tee "$GITHUB_WORKSPACE/ci-out/claim_conservation_clean.out"
          if grep -q -E 'FUZZ_FINDING|INVARIANT VIOLATED' "$GITHUB_WORKSPACE/ci-out/claim_conservation_clean.out"; then
            echo "::error::claim_conservation clean reported a violation — invariant is wrong or the reference has a real bug"
            exit 1
          fi

      - name: Crucible run — claim_conservation PLANTED (expect >=1 violation)
        id: claim_conservation_planted
        working-directory: references/jito_tipdist_ref_planted_claim_conservation/fuzz/jito_claim_conservation
        run: |
          set +e
          crucible run jito_tip_distribution invariant_claim_amount_conservation \
              --release --timeout "${CRUCIBLE_TIMEOUT}" \
              2>&1 | tee "$GITHUB_WORKSPACE/ci-out/claim_conservation_planted.out"
          rc=${PIPESTATUS[0]}
          set -e
          if grep -q -E 'FUZZ_FINDING|INVARIANT VIOLATED' "$GITHUB_WORKSPACE/ci-out/claim_conservation_planted.out"; then
            echo "claim_conservation planted reported a violation (expected)."
            exit 0
          elif [ "$rc" -ne 0 ]; then
            echo "claim_conservation planted exited non-zero ($rc); treating as detected violation."
            exit 0
          else
            echo "::error::claim_conservation planted ran clean — the off-by-one debit was not surfaced within ${CRUCIBLE_TIMEOUT}s."
            exit 1
          fi

      # -----------------------------------------------------------------
      # Pair 2 — no_double_claim
      # -----------------------------------------------------------------

      - name: Crucible run — no_double_claim CLEAN (expect 0 violations)
        id: no_double_claim_clean
        working-directory: references/jito_tipdist_ref/fuzz/jito_no_double_claim
        run: |
          set -o pipefail
          crucible run jito_tip_distribution invariant_no_double_claim \
              --release --timeout "${CRUCIBLE_TIMEOUT}" \
              2>&1 | tee "$GITHUB_WORKSPACE/ci-out/no_double_claim_clean.out"
          if grep -q -E 'FUZZ_FINDING|INVARIANT VIOLATED' "$GITHUB_WORKSPACE/ci-out/no_double_claim_clean.out"; then
            echo "::error::no_double_claim clean reported a violation — `init` constraint and runtime gate should both reject the replay"
            exit 1
          fi

      - name: Crucible run — no_double_claim PLANTED (expect >=1 violation)
        id: no_double_claim_planted
        working-directory: references/jito_tipdist_ref_planted_no_double_claim/fuzz/jito_no_double_claim
        run: |
          set +e
          crucible run jito_tip_distribution invariant_no_double_claim \
              --release --timeout "${CRUCIBLE_TIMEOUT}" \
              2>&1 | tee "$GITHUB_WORKSPACE/ci-out/no_double_claim_planted.out"
          rc=${PIPESTATUS[0]}
          set -e
          if grep -q -E 'FUZZ_FINDING|INVARIANT VIOLATED' "$GITHUB_WORKSPACE/ci-out/no_double_claim_planted.out"; then
            echo "no_double_claim planted reported a violation (expected)."
            exit 0
          elif [ "$rc" -ne 0 ]; then
            echo "no_double_claim planted exited non-zero ($rc); treating as detected violation."
            exit 0
          else
            echo "::error::no_double_claim planted ran clean — the init_if_needed + dropped-gate replay was not surfaced within ${CRUCIBLE_TIMEOUT}s."
            exit 1
          fi

      # -----------------------------------------------------------------
      # Pair 3 — merkle_authority
      # -----------------------------------------------------------------

      - name: Crucible run — merkle_authority CLEAN (expect 0 violations)
        id: merkle_authority_clean
        working-directory: references/jito_tipdist_ref/fuzz/jito_merkle_authority
        run: |
          set -o pipefail
          crucible run jito_tip_distribution invariant_merkle_proof_required \
              --release --timeout "${CRUCIBLE_TIMEOUT}" \
              2>&1 | tee "$GITHUB_WORKSPACE/ci-out/merkle_authority_clean.out"
          if grep -q -E 'FUZZ_FINDING|INVARIANT VIOLATED' "$GITHUB_WORKSPACE/ci-out/merkle_authority_clean.out"; then
            echo "::error::merkle_authority clean reported a violation — verify() should reject attacker leaf"
            exit 1
          fi

      - name: Crucible run — merkle_authority PLANTED (expect >=1 violation)
        id: merkle_authority_planted
        working-directory: references/jito_tipdist_ref_planted_merkle_authority/fuzz/jito_merkle_authority
        run: |
          set +e
          crucible run jito_tip_distribution invariant_merkle_proof_required \
              --release --timeout "${CRUCIBLE_TIMEOUT}" \
              2>&1 | tee "$GITHUB_WORKSPACE/ci-out/merkle_authority_planted.out"
          rc=${PIPESTATUS[0]}
          set -e
          if grep -q -E 'FUZZ_FINDING|INVARIANT VIOLATED' "$GITHUB_WORKSPACE/ci-out/merkle_authority_planted.out"; then
            echo "merkle_authority planted reported a violation (expected)."
            exit 0
          elif [ "$rc" -ne 0 ]; then
            echo "merkle_authority planted exited non-zero ($rc); treating as detected violation."
            exit 0
          else
            echo "::error::merkle_authority planted ran clean — the verify→true bypass was not surfaced within ${CRUCIBLE_TIMEOUT}s."
            exit 1
          fi

      # -----------------------------------------------------------------
      # Pair 4 — admin_gating
      # -----------------------------------------------------------------

      - name: Crucible run — admin_gating CLEAN (expect 0 violations)
        id: admin_gating_clean
        working-directory: references/jito_tipdist_ref/fuzz/jito_admin_gating
        run: |
          set -o pipefail
          crucible run jito_tip_distribution invariant_update_config_requires_authority \
              --release --timeout "${CRUCIBLE_TIMEOUT}" \
              2>&1 | tee "$GITHUB_WORKSPACE/ci-out/admin_gating_clean.out"
          if grep -q -E 'FUZZ_FINDING|INVARIANT VIOLATED' "$GITHUB_WORKSPACE/ci-out/admin_gating_clean.out"; then
            echo "::error::admin_gating clean reported a violation — UpdateConfig::auth should reject the attacker"
            exit 1
          fi

      - name: Crucible run — admin_gating PLANTED (expect >=1 violation)
        id: admin_gating_planted
        working-directory: references/jito_tipdist_ref_planted_admin_gating/fuzz/jito_admin_gating
        run: |
          set +e
          crucible run jito_tip_distribution invariant_update_config_requires_authority \
              --release --timeout "${CRUCIBLE_TIMEOUT}" \
              2>&1 | tee "$GITHUB_WORKSPACE/ci-out/admin_gating_planted.out"
          rc=${PIPESTATUS[0]}
          set -e
          if grep -q -E 'FUZZ_FINDING|INVARIANT VIOLATED' "$GITHUB_WORKSPACE/ci-out/admin_gating_planted.out"; then
            echo "admin_gating planted reported a violation (expected)."
            exit 0
          elif [ "$rc" -ne 0 ]; then
            echo "admin_gating planted exited non-zero ($rc); treating as detected violation."
            exit 0
          else
            echo "::error::admin_gating planted ran clean — the dropped UpdateConfig::auth gate was not surfaced within ${CRUCIBLE_TIMEOUT}s."
            exit 1
          fi

      # -----------------------------------------------------------------
      # Aggregate scorecards from real CI output. Renders findings/*/
      # markdown the same way cf-invariants-anchor does — diff-friendly
      # ANSI-stripped raw output + summary.
      # -----------------------------------------------------------------

      - name: Capture scorecards from real CI output
        if: always()
        run: |
          TC="rustc $(rustc --version | awk '{print $2}'), solana $(solana --version | awk '{print $2}'), platform-tools ${SOLANA_TOOLS_VERSION}, crucible v0.2.0 (anchor-lang 1.0.1)"
          STAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          render_scorecard() {
            local inv="$1" variant="$2" total="$3" violated="$4" class="$5"
            local out_dir="findings/${inv}_${variant}"
            local raw="$GITHUB_WORKSPACE/ci-out/${inv}_${variant}.out"
            mkdir -p "$out_dir"
            {
              echo "# cf-invariants-jito scorecard (CI capture, ${inv} ${variant} variant)"
              echo
              echo "Captured by \`.github/workflows/ci.yml\` on ${STAMP}."
              echo "Toolchain: ${TC}."
              echo "Crucible timeout: ${CRUCIBLE_TIMEOUT}s."
              echo "Invariant class: \`${class}\`."
              echo
              echo "## Summary"
              echo
              echo "- Invariants total: **${total}**"
              echo "- Invariants violated: **${violated}**"
              echo "- AI-suggested invariants in this run: **0**"
              echo "- Crucible version: \`0.2.0\`"
              echo
              echo "## Raw output"
              echo
              echo '```'
              if [ -f "$raw" ]; then
                sed -E 's/\x1b\[[0-9;]*[A-Za-z]//g' "$raw"
              else
                echo "(no output captured)"
              fi
              echo '```'
            } > "$out_dir/scorecard.md"
          }
          render_scorecard "claim_conservation" "clean"   "1" "0"   "claim_amount_conservation"
          render_scorecard "claim_conservation" "planted" "1" ">=1" "claim_amount_conservation"
          render_scorecard "no_double_claim"    "clean"   "1" "0"   "no_double_claim"
          render_scorecard "no_double_claim"    "planted" "1" ">=1" "no_double_claim"
          render_scorecard "merkle_authority"   "clean"   "1" "0"   "merkle_authority"
          render_scorecard "merkle_authority"   "planted" "1" ">=1" "merkle_authority"
          render_scorecard "admin_gating"       "clean"   "1" "0"   "admin_gating"
          render_scorecard "admin_gating"       "planted" "1" ">=1" "admin_gating"

      - name: Upload scorecards + raw output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crucible-scorecards
          path: |
            ci-out/*.out
            findings/claim_conservation_clean/scorecard.md
            findings/claim_conservation_planted/scorecard.md
            findings/no_double_claim_clean/scorecard.md
            findings/no_double_claim_planted/scorecard.md
            findings/merkle_authority_clean/scorecard.md
            findings/merkle_authority_planted/scorecard.md
            findings/admin_gating_clean/scorecard.md
            findings/admin_gating_planted/scorecard.md
