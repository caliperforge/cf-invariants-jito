name: ci

# cf-invariants-jito Phase-1 baseline CI.
#
# The CI run IS the proof: zero local toolchain footprint, every push rebuilds
# the Jito tip-distribution program (anchor-lang 0.31.1 -> 1.0.1 port) and
# confirms `cargo build-sbf` stays green. Phase 2 will layer the Crucible
# harness on top (clean + planted pairs per invariant class:
# claim-amount conservation / no-double-claim / merkle-root authority /
# admin gating). For now this is build-baseline only.
#
# Pinned upstream surfaces (matched to cf-invariants-anchor's ci.yml and
# cf-invariants-svs1's ci.yml):
#   - anchor-lang:     1.0.1     (matches Crucible v0.2.0 workspace)
#   - Solana CLI:      v2.1.21   (Anza release; recent stable)
#   - platform-tools:  v1.52     (recent tag with linux-x86_64 asset; the
#                                 bundled default in Agave v2.1.21 is v1.43,
#                                 too old for anchor-lang 1.0.1 deps.
#                                 NB: Agave v2.1.21 ships a buggy
#                                 cargo-build-sbf that panics if
#                                 ~/.cache/solana doesn't exist - we mkdir
#                                 it explicitly before the first invocation.)
#
# The two env vars GIT_SHA / GIT_REF_NAME are read by the program's build.rs
# and baked into the on-chain security-txt block via env!(). Without them the
# build emits a "GIT_SHA_MISSING" / "GIT_REF_NAME_MISSING" placeholder, which
# is fine for CI - this CI is not producing release artifacts for mainnet, only
# proof-of-buildability for the harness pipeline.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: v2.1.21
  SOLANA_TOOLS_VERSION: v1.52

jobs:
  workspace-check:
    name: cf-invariants-jito workspace check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: cargo check --workspace
        run: cargo check --workspace --locked || cargo check --workspace

  build-sbf:
    name: cargo build-sbf jito-tip-distribution
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Anza / Solana CLI ${{ env.SOLANA_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Pre-create platform-tools cache dir
        # Workaround for cargo-build-sbf bug in Agave v2.1.21
        # (sdk/cargo-build-sbf/src/main.rs:146): `find_installed_platform_tools`
        # calls `std::fs::read_dir(~/.cache/solana).unwrap()` and panics with
        # `Os { code: 2, kind: NotFound }` on a fresh runner where the cache
        # dir has never been created. Creating it up-front turns the panic
        # into an empty-cache no-op so the tool proceeds to download the
        # pinned platform-tools tarball.
        run: mkdir -p "$HOME/.cache/solana"

      - name: Verify solana / cargo-build-sbf on PATH
        run: |
          solana --version
          cargo-build-sbf --version

      - name: cargo build-sbf jito-tip-distribution
        env:
          GIT_SHA: ${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          cargo build-sbf \
            --tools-version "${SOLANA_TOOLS_VERSION}" \
            --manifest-path programs/tip-distribution/Cargo.toml
          ls -l target/deploy/jito_tip_distribution.so

      - name: Upload built program artifact
        uses: actions/upload-artifact@v4
        with:
          name: jito_tip_distribution-so
          path: target/deploy/jito_tip_distribution.so
